<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#217346">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>골프 라운딩 관리</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <div id="appbar"></div>
    <div id="screen" class="screen">
      <div class="loading">데이터 불러오는 중…</div>
    </div>
    <nav class="tabbar" id="tabbar"></nav>
  </div>
  <div class="toast" id="toast"></div>

  <!-- sql.js (SQLite WASM) - 앱 내장(오프라인) -->
  <script src="vendor/sql-wasm.js"></script>
  <!-- 본질 로직 + 데이터 계층 -->
  <script src="js/calc.js"></script>
  <script src="js/db.js"></script>
  <!-- 화면 -->
  <script src="js/screen_input.js"></script>
  <script src="js/screen_home.js"></script>
  <script src="js/screen_list.js"></script>
  <script src="js/screen_stats.js"></script>
  <script src="js/screen_settings.js"></script>
  <!-- 앱 부트 -->
  <script src="js/app.js"></script>
  <!-- 오프라인(서비스워커) 등록 -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js").catch(function (e) { console.warn("SW 등록 실패", e); });
      });
    }
  </script>
</body>
</html>
